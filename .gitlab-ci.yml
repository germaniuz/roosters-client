stages:
  - build
  - run

build:
  stage: build
  only:
    - develop
  script:
    - cp -rv $STAGE_ENV_FILE .env
    - /home/devops/.bun/bin/bun i
    - /home/devops/.bun/bin/bun run build
    - repo_dir=$(pwd)
    - cd ../
    - rm -rf client-current
    - mv $repo_dir client-current
    - ln -snf $(pwd)/client-current /var/www/roosters-dev.ru
  tags:
    - roosters-runner
run:
  stage: run
  only:
    - develop
  script:
    - cd /var/www/roosters-dev.ru
    - pm2 start
  tags:
    - roosters-runner