type Mutation {
    "Применение промокода к корзине"
    applyClientCartPromocodeDiscount("Промокод для применения" code: String!): ClientDiscountApplicationResult
    "Изменение количества в корзине"
    changeClientCartItemQuantity(cart_item_id: Int!, quantity: Int!): [ClientCartItem]
    "Добавление в корзину"
    createClientCart(
        cart_category_option_ingredients: [ClientCartCategoryOptionIngredientFieldInput]
        cart_product_unique_ingredients: [ClientCartProductUniqueIngredientFieldInput]
        exclude_product_ingredient_ids: [Int]
        preset: ClientPresetFieldInput
        product_category_option: ClientProductCategoryOptionFieldInput
    ): [ClientCartItem]
    "Создание заказа"
    createClientOrder(
        "Комментарий клиента"
        customer_comment: String
        "Тип оплаты"
        delivery_type: CommonEnumsDeliveryTypeEnum!
        "Тип оплаты"
        payment_type: CommonEnumsPaymentTypeEnum!
        "ID торговой точки"
        shop_id: Int!
        "Тип доставки"
        user_address: CommonUserAddressInput
    ): CommonOrder
    "Создание ссылки для оплаты"
    createClientOrderPaymentUrl("ID заказа" order_id: Int): ClientPaymentUrl
    "Удаление товара из корзины"
    deleteClientCart(cart_item_id: Int!): Boolean
    "Очистка корзины"
    dropClientCart: Boolean
    "Удаление промокода из корзины"
    removeClientCartPromocodeDiscount("ID промокода для удаления" promocode_id: Int!): ClientDiscountApplicationResult
    "Повторение заказа"
    repeatClientOrder("ID заказа" order_id: Int!): [ClientCartItem]
    sendClientSmsCode(phone: String!): CommonSmsCode
    "Вращение колеса фортуны"
    spinClientFortuneWheelSpin(order_id: Int!): CommonFortuneWheelSlot
    "Изменение корзины"
    updateClientCart(
        cart_category_option_ingredients: [ClientCartCategoryOptionIngredientFieldInput]
        cart_item_id: Int!
        cart_product_unique_ingredients: [ClientCartProductUniqueIngredientFieldInput]
        preset: ClientPresetFieldInput
        product_category_option: ClientProductCategoryOptionFieldInput
    ): [ClientCartItem]
    "Изменение пользователя"
    updateClientUser(
        avatar: Upload
        birthday: String
        email: String
        gender: CommonEnumsGenderEnum
        lastname: String
        name: String
    ): ClientProfile
    verifyClientSmsCode(code: String!, phone: String!): CommonToken
}

type Query {
    "Доступные скидки для корзины"
    clientAvailableCartDiscounts("Промокод для проверки (опционально)" promocode: String): [ClientAvailableDiscount]
    "Корзина"
    clientCart(
        "Max 50"
        ids: [Int]
        "Max 50"
        limit: Int = 30
        offset: Int = 0
        orders: [ClientCartOrder]
    ): ClientCartItemList
    "Список категорий для клиента"
    clientCategoryList(
        "Поиск без учета регистра (по умолчанию: true)"
        case_insensitive_search: Boolean = true
        "Max 50"
        ids: [Int]
        "Max 50"
        limit: Int = 30
        offset: Int = 0
        orders: [ClientCategoryListOrder]
        search: String
    ): CommonCategoryList
    "Колесо фортуны"
    clientFortuneWheel: [CommonFortuneWheelSlot]
    "История прокрутки колеса фортуны (пользователь)"
    clientFortuneWheelSpins: [CommonFortuneWheelSpin]
    "Список заказов для клиента"
    clientOrderList(
        "Поиск без учета регистра (по умолчанию: true)"
        case_insensitive_search: Boolean = true
        "Max 50"
        ids: [Int]
        "Max 50"
        limit: Int = 30
        offset: Int = 0
        orders: [ClientOrderListOrder]
        search: String
    ): CommonOrderList
    "Список способов оплаты"
    clientPaymentTypes: [ClientPaymentType]
    "Список продуктов для клиента"
    clientProductList(
        "Поиск без учета регистра (по умолчанию: true)"
        case_insensitive_search: Boolean = true
        "Max 50"
        ids: [Int]
        "Max 50"
        limit: Int = 30
        offset: Int = 0
        orders: [ClientProductListOrder]
        search: String
    ): CommonProductList
    "Профиль клиента"
    clientProfile: ClientProfile
    "Общий список торговых точек"
    clientShopList(
        "Поиск без учета регистра (по умолчанию: true)"
        case_insensitive_search: Boolean = true
        "Показ неактивной информации"
        get_inactive: Boolean = false
        "Max 50"
        ids: [Int]
        "Max 50"
        limit: Int = 10
        offset: Int = 0
        orders: [ClientShopListOrder]
        search: String
    ): CommonShopList
    "Текущая торговая точка относительно геозон и времени работы"
    currentGeozoneDeliveryShop("Широта" latitude: Float!, "Долгота" longitude: Float!): CommonShop
    "Процент бонусов от её диапазона"
    getClientAppBonusPercent("Сумма" sum: Float!): CommonSettingBonusPercent
    "Диапазоны бонусов"
    getClientAppBonusRanges: [CommonSettingBonusRange]
    "Настройки клиента"
    getClientAppSetting("Ключ настройки" setting_key: String!): CommonSetting
    "Работает ли сейчас торговая точка самовывозом"
    isPickupShopOpen("Торговая точка" shop_id: Float!): Boolean
}

