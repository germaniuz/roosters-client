    name: String
    "Phone"
    phone: String
    "Адрес самовывоза"
    shop: CommonShop
    "Дата последнего изменения пользователя"
    updated_at: String
}

"Адрес"
type CommonUserAddress {
    "Основной адрес"
    address: CommonAddress
    "Квартира"
    apartment: String
    "Комментарий"
