"""
The `Upload` special type represents a file to be uploaded in the same HTTP request as specified by
[graphql-multipart-request-spec](https://github.com/jaydenseric/graphql-multipart-request-spec).
"""
scalar Upload

"Данные по ингредиентам в корзине"
input ClientCartCategoryOptionIngredientFieldInput {
    "Идентификатор ингредиента"
    category_option_ingredient_id: Int!
    "Количество ингредиентов"
    quantity: Int!
}

input ClientCartOrder {
    dir: CommonOrderDirectionEnum = asc
    field: ClientCartOrderField!
}

"Данные по уникальным добавкам для товара в корзине"
input ClientCartProductUniqueIngredientFieldInput {
    "Идентификатор ингредиента"
    product_unique_ingredient_id: Int!
    "Количество ингредиентов"
    quantity: Int!
}

input ClientCategoryListOrder {
    dir: CommonOrderDirectionEnum = asc
    field: ClientCategoryListOrderField!
}

input ClientOrderListOrder {
    dir: CommonOrderDirectionEnum = asc
    field: ClientOrderListOrderField!
}

"Данные по сетам"
input ClientPresetFieldInput {
    "Идентификатор сетам"
    preset_id: Int!
    "Количество товара"
    quantity: Int!
}

"Данные по вариантам товара"
input ClientProductCategoryOptionFieldInput {
    "Идентификатор варианта товара"
    product_category_option_id: Int!
    "Количество товара"
    quantity: Int!
}

input ClientProductListOrder {
    dir: CommonOrderDirectionEnum = asc
    field: ClientProductListOrderField!
}

input ClientShopListOrder {
    dir: CommonOrderDirectionEnum = asc
    field: ClientShopListOrderField!
}

"Поля создания и обновления координат адреса"
input CommonAddressLocationInput {
    "Широта"
    latitude: Float!
    "Долгота"
    longitude: Float!
}

"Поля создания и обновления адреса пользователя"
input CommonUserAddressInput {
    "Квартира"
    apartment: String
    "Город"
    city: String!
    "Комментарий"
    comment: String
    "Подъезд"
    entrance: String
    "Идентификатор ФИАС"
    fias_id: String!
    "Этаж"
    floor: Int
    "Дом"
    house: String!
    "Код домофона"
    intercom_code: String
    "Локация"
    location: CommonAddressLocationInput!
    "Улица"
    street: String!
    "Тип улицы"
    street_type: String!
}
