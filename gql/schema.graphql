    category_option_ingredient_id: Int!
    "Количество ингредиентов"
    quantity: Int!
}

"Данные по сетам"
input AppGraphQLv1ClientTypesPresetFieldInput {
    "Идентификатор сетам"
    preset_id: Int!
    "Количество товара"
    quantity: Int!
}

"Данные по вариантам товара"
input AppGraphQLv1ClientTypesProductCategoryOptionFieldInput {
    "Идентификатор варианта товара"
    product_category_option_id: Int!
    "Количество товара"
    quantity: Int!
}

"Поля создания и обновления координат адреса"
input AppGraphQLv1CommonTypesAddressLocationInput {
    "Широта"
    latitude: Float!
    "Долгота"
    longitude: Float!
}

"Поля создания и обновления адреса пользователя"
input AppGraphQLv1CommonTypesUserAddressInput {
    "Квартира"
    apartment: String
    "Город"
    city: String!
    "Комментарий"
    comment: String
    "Подъезд"
    entrance: String
    "Идентификатор ФИАС"
    fias_id: String!
    "Этаж"
    floor: Int
    "Дом"
    house: String!
    "Код домофона"
    intercom_code: String
    "Локация"
    location: AppGraphQLv1CommonTypesAddressLocationInput!
    "Улица"
    street: String!
    "Тип улицы"
    street_type: String!
}

input ClientOrderListOrder {
    dir: CommonOrderDirectionEnum = asc
    field: ClientOrderListOrderField!
}

input ClientProductListOrder {
    dir: CommonOrderDirectionEnum = asc
    field: ClientProductListOrderField!
}

input ClientShopListOrder {
    dir: CommonOrderDirectionEnum = asc
    field: ClientShopListOrderField!
}
